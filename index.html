<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Kakei+</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/calendar.css">
  <link rel="stylesheet" href="css/overview.css">
  <link rel="stylesheet" href="css/detail.css">
  <link rel="stylesheet" href="css/print.css">
</head>
<body>
  <div id="app">

    <!-- ===== Header ===== -->
    <header id="app-header">
      <button id="btn-prev-month" class="hdr-nav-btn" aria-label="前月">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/>
        </svg>
      </button>
      <div class="hdr-center">
        <span class="hdr-app-name">Kakei+</span>
        <span id="header-month-label" class="hdr-month">読み込み中</span>
      </div>
      <div class="hdr-btn-group">
        <button id="btn-next-month" class="hdr-nav-btn" aria-label="次月">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/>
          </svg>
        </button>
        <button id="auth-logout-btn" class="hdr-nav-btn hidden" aria-label="ログアウト"
                onclick="FirestoreDB.signOut()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Auth Overlay（未ログイン時に表示） -->
    <div id="auth-overlay" class="hidden">
      <div id="auth-card">
        <div class="auth-logo">
          <span class="auth-logo-name">Kakei+</span>
          <span class="auth-logo-sub">自分だけの家計簿</span>
        </div>
        <div id="auth-tabs">
          <button class="auth-tab active" data-mode="signin"
                  onclick="FirestoreDB.switchMode('signin')">ログイン</button>
          <button class="auth-tab" data-mode="signup"
                  onclick="FirestoreDB.switchMode('signup')">新規登録</button>
        </div>
        <div id="auth-error"   class="auth-msg auth-msg-error   hidden"></div>
        <div id="auth-success" class="auth-msg auth-msg-success hidden"></div>
        <div class="form-group">
          <label class="form-label">メールアドレス</label>
          <input id="auth-email" class="form-input" type="email"
                 inputmode="email" placeholder="example@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">パスワード</label>
          <input id="auth-password" class="form-input" type="password"
                 placeholder="6文字以上" autocomplete="current-password">
        </div>
        <button id="auth-submit-btn" class="btn-auth-submit"
                onclick="FirestoreDB.submitAuth()">ログイン</button>
        <button id="auth-reset-btn" class="btn-auth-reset"
                onclick="FirestoreDB.resetPassword()">パスワードを忘れた方</button>
      </div>
    </div>

    <!-- ===== Main Pages ===== -->
    <main id="app-main">

      <!-- 全体管理ページ -->
      <section id="page-overview" class="page active">
        <div id="calendar-section"></div>
        <div id="summary-section"></div>
        <div id="category-section"></div>
        <div id="fixed-section"></div>
        <div id="income-section"></div>
      </section>

      <!-- 明細入力ページ -->
      <section id="page-detail" class="page">
        <div id="detail-input-section"></div>
        <div id="detail-list-section"></div>
      </section>

      <!-- 印刷ページ -->
      <section id="page-print" class="page">
        <div id="print-actions-bar"></div>
        <div id="print-preview"></div>
      </section>

    </main>

    <!-- ===== Bottom Navigation ===== -->
    <nav id="bottom-nav">
      <button class="nav-btn active" data-page="overview">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
        </svg>
        <span>全体管理</span>
      </button>
      <button class="nav-btn" data-page="detail">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
        </svg>
        <span>明細入力</span>
      </button>
      <button class="nav-btn" data-page="print">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>
        </svg>
        <span>印刷</span>
      </button>
    </nav>

    <!-- ===== Modal ===== -->
    <div id="modal-overlay" class="hidden"></div>
    <div id="modal-box" class="hidden" role="dialog" aria-modal="true">
      <div id="modal-header">
        <h2 id="modal-title"></h2>
        <button id="modal-close-btn" aria-label="閉じる">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
      <div id="modal-body"></div>
    </div>

    <!-- Autocomplete dropdown (positioned by JS) -->
    <ul id="autocomplete-list" class="hidden" role="listbox"></ul>

  </div><!-- #app -->

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- Scripts — 依存順に読み込む -->
  <script src="js/firebase-config.js"></script>
  <script src="js/firestore.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/overview.js"></script>
  <script src="js/detail.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/print.js"></script>
</body>
</html>
