name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KAKEI_AD3F5 }}'

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --project kakei-ad3f5 --non-interactive
